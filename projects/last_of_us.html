<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Last of Us — Game Audio</title>
<link rel="stylesheet" href="../style.css">
</head>

<body class="project-page-body">

<nav>
  <a href="../index.html#projects">Game Audio</a>
  <a href="../index.html#film">Film</a>
  <a href="../about.html">About</a>
  <a href="../index.html#contact">Contact</a>
</nav>
<section class="project-page">

  <!-- VIDEO WITH TITLE + PLAY BUTTON OVERLAY -->
  <div class="video-container">
    <video id="project-video" controls preload="metadata">
      <source src="../assets/last_of_us_reel.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <!-- Overlay before play -->
    <div class="video-overlay" id="video-overlay">
      <h1 class="video-title">The Last of Us</h1>
      <div class="play-button" id="play-button">&#9658;</div>
    </div>
  </div>

  <!-- Subtitle BELOW video -->
  <p class="video-subtitle">Sound Redesign</p>

  <div class="project-text">
    <p>This project involved a complete sound redesign for <em>The Last of Us</em> sequences...</p>
    <img src="../assets/last_of_us_screenshot1.jpg" alt="Scene from The Last of Us project">
    <p>Example of interactive audio environment in-game.</p>
    <img src="../assets/last_of_us_screenshot2.jpg" alt="Sound redesign workflow">
    <p>Snapshot of sound redesign workflow in Wwise.</p>
  </div>

</section>

<script>
const video = document.getElementById('project-video');
const overlay = document.getElementById('video-overlay');
const playButton = document.getElementById('play-button');
const body = document.querySelector('body');

// Play overlay
playButton.addEventListener('click', () => {
  video.play();
  overlay.style.opacity = 0;
  setTimeout(() => overlay.style.display = 'none', 500);
});

// Show overlay again if video ends
video.addEventListener('ended', () => {
  overlay.style.display = 'flex';
  overlay.style.opacity = 1;
});

// Scroll-based background color shift with hue, saturation, lightness
window.addEventListener('scroll', () => {
  const scrollAmount = window.scrollY;

  // Hue: 350 (red) → 180 (teal)
  let hue = 350 - scrollAmount / 15;
  if (hue < 180) hue = 180;

  // Saturation: 70% → 50%
  let sat = 70 - scrollAmount / 100;
  if (sat < 50) sat = 50;

  // Lightness: 12% → 18%
  let light = 12 + scrollAmount / 100;
  if (light > 18) light = 18;

  body.style.backgroundColor = `hsl(${hue}, ${sat}%, ${light}%)`;
});
</script>

</body>
</html>
